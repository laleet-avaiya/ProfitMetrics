<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="Profit Metrics marketing poster">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="45%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="900" cy="180" rx="280" ry="220" fill="url(#glow)" filter="url(#softGlow)"/>
  <ellipse cx="120" cy="920" rx="240" ry="200" fill="#22d3ee" opacity="0.08"/>

  <!-- Decorative chart motif -->
  <g opacity="0.12" transform="translate(720, 640)">
    <rect x="0" y="120" width="48" height="80" rx="10" fill="#ffffff"/>
    <rect x="72" y="80" width="48" height="120" rx="10" fill="#ffffff"/>
    <rect x="144" y="20" width="48" height="180" rx="10" fill="#ffffff"/>
    <polyline points="24,200 96,160 168,60" fill="none" stroke="#22d3ee" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Logo card -->
  <g filter="url(#shadow)">
    <rect x="140" y="88" width="800" height="220" rx="36" fill="#ffffff"/>
    <g transform="translate(336, 89) scale(0.85)">
      <g transform="translate(28, 28) scale(0.75)">
        <rect x="48" y="152" width="40" height="56" rx="8" fill="#0c4a6e"/>
        <rect x="108" y="120" width="40" height="88" rx="8" fill="#0e7490"/>
        <rect x="168" y="80" width="40" height="128" rx="8" fill="#10b981"/>
        <polyline points="68,168 128,136 188,96" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="68" cy="168" r="6" fill="#22d3ee"/>
        <circle cx="128" cy="136" r="6" fill="#22d3ee"/>
        <circle cx="188" cy="96" r="6" fill="#22d3ee"/>
      </g>
      <text x="220" y="112" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#0f172a">Profit</text>
      <text x="220" y="168" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="44" font-weight="700" fill="#0e7490">Metrics</text>
    </g>
  </g>

  <!-- Headline -->
  <text x="540" y="400" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Know Your Real Profit
  </text>
  <text x="540" y="468" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="500" fill="#a5f3fc">
    Not just revenue - true margins across every marketplace
  </text>

  <!-- Value props -->
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(150, 540)">
      <rect x="0" y="0" width="360" height="112" rx="20" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="36" cy="56" r="10" fill="#22d3ee"/>
      <text x="64" y="48" font-size="26" font-weight="700" fill="#ffffff">Auto profit per order</text>
      <text x="64" y="78" font-size="20" font-weight="400" fill="#cffafe">Fees, tax, returns included</text>
    </g>
    <g transform="translate(570, 540)">
      <rect x="0" y="0" width="360" height="112" rx="20" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="36" cy="56" r="10" fill="#10b981"/>
      <text x="64" y="48" font-size="26" font-weight="700" fill="#ffffff">Multi-platform P&amp;L</text>
      <text x="64" y="78" font-size="20" font-weight="400" fill="#cffafe">Amazon, Shopify, Noon &amp; more</text>
    </g>
    <g transform="translate(150, 680)">
      <rect x="0" y="0" width="360" height="112" rx="20" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="36" cy="56" r="10" fill="#22d3ee"/>
      <text x="64" y="48" font-size="26" font-weight="700" fill="#ffffff">GST / VAT reports</text>
      <text x="64" y="78" font-size="20" font-weight="400" fill="#cffafe">Built for India &amp; UAE sellers</text>
    </g>
    <g transform="translate(570, 680)">
      <rect x="0" y="0" width="360" height="112" rx="20" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18"/>
      <circle cx="36" cy="56" r="10" fill="#10b981"/>
      <text x="64" y="48" font-size="26" font-weight="700" fill="#ffffff">7-day free trial</text>
      <text x="64" y="78" font-size="20" font-weight="400" fill="#cffafe">One simple annual plan</text>
    </g>
  </g>

  <!-- CTA -->
  <g filter="url(#shadow)">
    <rect x="250" y="860" width="580" height="96" rx="48" fill="#10b981"/>
    <text x="540" y="920" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff">
      Start Your Free Trial
    </text>
  </g>

  <!-- URL -->
  <text x="540" y="1010" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.92">
    epm.avaiyasoftware.com
  </text>
</svg>
